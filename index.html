<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
:root{
  --bg:#0d0f17;--surface:#161923;--surface2:#1e2130;--surface3:#252840;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#e4e7f2;--text-muted:#6b718a;--text-faint:#2e3145;
  --rtt-full:#3b82f6;--rtt-full-bg:rgba(59,130,246,0.16);--rtt-full-glow:rgba(59,130,246,0.3);
  --rtt-half:#f59e0b;--rtt-half-bg:rgba(245,158,11,0.16);--rtt-half-glow:rgba(245,158,11,0.3);
  --cp-full:#10b981;--cp-full-bg:rgba(16,185,129,0.16);--cp-full-glow:rgba(16,185,129,0.3);
  --cp-half:#34d399;--cp-half-bg:rgba(52,211,153,0.16);--cp-half-glow:rgba(52,211,153,0.3);
  --weekend-bg:rgba(255,255,255,0.02);--weekend-text:rgba(239,68,68,0.45);
  --today-bg:rgba(168,85,247,0.13);--today-border:#a855f7;
  --ferie-bg:rgba(239,68,68,0.1);--ferie-text:rgba(239,68,68,0.7);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:#0d0f17;color:var(--text);min-height:100vh;padding:2rem 1.5rem 5rem;position:relative;overflow-x:hidden;}
#dbz-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
#dbz-bg img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;}
#dbz-bg .overlay{position:absolute;inset:0;background:rgba(5,5,15,0.72);}
body>*:not(#dbz-bg){position:relative;z-index:1;}

/* SYNC BANNER */
.sync-bar{max-width:1180px;margin:0 auto 1rem;padding:8px 14px;border-radius:10px;font-size:.75rem;display:flex;align-items:center;gap:8px;transition:all .3s;}
.sync-bar.syncing{background:rgba(59,130,246,.15);border:.5px solid rgba(59,130,246,.3);color:#93c5fd;}
.sync-bar.synced{background:rgba(16,185,129,.12);border:.5px solid rgba(16,185,129,.25);color:#6ee7b7;}
.sync-bar.error{background:rgba(239,68,68,.12);border:.5px solid rgba(239,68,68,.25);color:#fca5a5;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:currentColor;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.sync-bar.syncing .sync-dot{animation:pulse .8s infinite;}

.topbar{max-width:1180px;margin:0 auto 2rem;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.topbar h1{font-size:1.55rem;font-weight:600;letter-spacing:-.025em;background:linear-gradient(135deg,#e4e7f2 0%,#8891b8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.topbar p{font-size:.75rem;color:var(--text-muted);margin-top:3px;text-transform:uppercase;letter-spacing:.05em;}
.cycle-nav{max-width:1180px;margin:0 auto 1.5rem;display:flex;gap:8px;flex-wrap:wrap;}
.cycle-tab{padding:6px 16px;border-radius:99px;font-size:.78rem;font-weight:500;border:.5px solid var(--border2);background:var(--surface2);color:var(--text-muted);cursor:pointer;transition:all .15s;}
.cycle-tab:hover{background:var(--surface3);color:var(--text);}
.cycle-tab.active{background:rgba(59,130,246,.18);border-color:rgba(59,130,246,.4);color:#93c5fd;}
.cycle-tab .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;background:var(--text-muted);}
.cycle-tab.active .dot{background:#3b82f6;}
.cycle-tab.c2.active{background:rgba(16,185,129,.18);border-color:rgba(16,185,129,.4);color:#6ee7b7;}
.cycle-tab.c2.active .dot{background:#10b981;}
.cycle-tab.c3.active{background:rgba(245,158,11,.18);border-color:rgba(245,158,11,.4);color:#fcd34d;}
.cycle-tab.c3.active .dot{background:#f59e0b;}
.cycle-tab.c4.active{background:rgba(168,85,247,.18);border-color:rgba(168,85,247,.4);color:#d8b4fe;}
.cycle-tab.c4.active .dot{background:#a855f7;}
.cycle-tab.c5.active{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.4);color:#fca5a5;}
.cycle-tab.c5.active .dot{background:#ef4444;}
.cycle-tab.c6.active{background:rgba(6,182,212,.18);border-color:rgba(6,182,212,.4);color:#67e8f9;}
.cycle-tab.c6.active .dot{background:#06b6d4;}
.stats-bar{max-width:1180px;margin:0 auto 1.5rem;display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
@media(max-width:700px){.stats-bar{grid-template-columns:repeat(2,1fr);}}
.stat{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:.9rem 1.1rem;position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:12px 12px 0 0;}
.stat.c1::before{background:linear-gradient(90deg,#3b82f6,#6366f1);}
.stat.c2::before{background:linear-gradient(90deg,#10b981,#06b6d4);}
.stat.c3::before{background:linear-gradient(90deg,#f59e0b,#ef4444);}
.stat.c4::before{background:linear-gradient(90deg,#a855f7,#ec4899);}
.stat-lbl{font-size:.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.stat-val{font-size:1.7rem;font-weight:600;letter-spacing:-.03em;line-height:1;}
.stat.c1 .stat-val{color:#60a5fa;}.stat.c2 .stat-val{color:#34d399;}.stat.c3 .stat-val{color:#fbbf24;}.stat.c4 .stat-val{color:#c084fc;}
.stat-sub{font-size:.68rem;color:var(--text-muted);margin-top:3px;}
.prog-track{height:5px;background:var(--surface2);border-radius:99px;margin-top:8px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#3b82f6,#6366f1);transition:width .4s;}
.prog-fill.over{background:linear-gradient(90deg,#ef4444,#f59e0b);}
.cal-wrap{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media(max-width:860px){.cal-wrap{grid-template-columns:repeat(2,1fr);}}
@media(max-width:540px){.cal-wrap{grid-template-columns:1fr;}}
.month-card{background:var(--surface);border:.5px solid var(--border);border-radius:14px;padding:.9rem;transition:border-color .2s;}
.month-card:hover{border-color:var(--border2);}
.month-title{font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text);margin-bottom:.65rem;display:flex;align-items:center;justify-content:space-between;}
.month-title .yr{font-size:.68rem;color:var(--text-muted);font-weight:400;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.dow{text-align:center;font-size:.58rem;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:.03em;padding:3px 0 5px;}
.dow.we{color:rgba(239,68,68,.38);}
.day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.68rem;border-radius:6px;cursor:pointer;transition:all .12s;color:var(--text-muted);user-select:none;position:relative;}
.day:hover:not(.empty):not(.we):not(.fe){background:rgba(255,255,255,.05);color:var(--text);}
.day.empty,.day.we{cursor:default;}
.day.we{background:var(--weekend-bg);color:var(--weekend-text);}
.day.fe{background:var(--ferie-bg);color:var(--ferie-text);cursor:default;}
.day.today{background:var(--today-bg);border:.5px solid var(--today-border);color:#d8b4fe;font-weight:600;}
.day.rtt-full{background:var(--rtt-full-bg);color:#93c5fd;font-weight:600;box-shadow:inset 0 0 0 1px var(--rtt-full-glow);}
.day.rtt-half{background:var(--rtt-half-bg);color:#fcd34d;font-weight:600;box-shadow:inset 0 0 0 1px var(--rtt-half-glow);}
.day.cp-full{background:var(--cp-full-bg);color:#6ee7b7;font-weight:600;box-shadow:inset 0 0 0 1px var(--cp-full-glow);}
.day.cp-half{background:var(--cp-half-bg);color:#a7f3d0;font-weight:600;box-shadow:inset 0 0 0 1px var(--cp-half-glow);}
.day.rtt-full::after,.day.rtt-half::after,.day.cp-full::after,.day.cp-half::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;}
.day.rtt-full::after{background:#3b82f6;}.day.rtt-half::after{background:#f59e0b;}
.day.cp-full::after{background:#10b981;}.day.cp-half::after{background:#34d399;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:.5px solid var(--border2);border-radius:18px;padding:1.5rem;width:340px;max-width:92vw;box-shadow:0 28px 64px rgba(0,0,0,.6);animation:pop .18s ease;}
@keyframes pop{from{opacity:0;transform:scale(.93) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-hd{font-size:.98rem;font-weight:600;margin-bottom:.3rem;}
.modal-dt{font-size:.78rem;color:var(--text-muted);margin-bottom:1.1rem;}
.opt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1rem;}
.ob{border:.5px solid var(--border2);border-radius:10px;background:var(--surface2);color:var(--text);font-family:inherit;font-size:.75rem;font-weight:500;padding:.6rem .4rem;cursor:pointer;transition:all .13s;text-align:center;line-height:1.4;}
.ob:hover{border-color:rgba(59,130,246,.5);color:#93c5fd;background:rgba(59,130,246,.08);}
.ob.sel-full{background:var(--rtt-full-bg);border-color:rgba(59,130,246,.5);color:#93c5fd;}
.ob.sel-half{background:var(--rtt-half-bg);border-color:rgba(245,158,11,.5);color:#fcd34d;}
.ob.sel-rm{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.4);color:#f87171;}
.ob.rm{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.3);color:rgba(239,68,68,.7);}
.ob.rm:hover{background:rgba(239,68,68,.15);border-color:#ef4444;color:#fca5a5;}
.note-lbl{font-size:.7rem;color:var(--text-muted);margin-bottom:5px;}
.note-inp{width:100%;background:var(--surface2);border:.5px solid var(--border2);border-radius:8px;color:var(--text);font-family:inherit;font-size:.78rem;padding:7px 10px;resize:none;}
.note-inp:focus{outline:none;border-color:rgba(59,130,246,.5);}
.modal-err{font-size:.72rem;color:#f87171;margin-top:7px;min-height:1rem;}
.modal-btns{display:flex;gap:8px;margin-top:.9rem;}
.btn-ok{flex:1;background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:8px;color:#fff;font-family:inherit;font-size:.8rem;font-weight:600;padding:.58rem;cursor:pointer;transition:opacity .15s;}
.btn-ok:hover{opacity:.85;}
.btn-cancel{background:var(--surface2);border:.5px solid var(--border2);border-radius:8px;color:var(--text-muted);font-family:inherit;font-size:.8rem;padding:.58rem 1rem;cursor:pointer;transition:all .15s;}
.btn-cancel:hover{color:var(--text);}
.legend{max-width:1180px;margin:1.25rem auto 0;display:flex;flex-wrap:wrap;gap:14px;align-items:center;}
.li{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--text-muted);}
.ld{width:11px;height:11px;border-radius:3px;}
.list-panel{max-width:1180px;margin:1.5rem auto 0;background:var(--surface);border:.5px solid var(--border);border-radius:14px;overflow:hidden;}
.list-hd{padding:.8rem 1.2rem;border-bottom:.5px solid var(--border);font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);display:flex;justify-content:space-between;}
.list-row{display:flex;align-items:center;gap:10px;padding:.55rem 1.2rem;border-bottom:.5px solid rgba(255,255,255,.025);transition:background .1s;}
.list-row:hover{background:rgba(255,255,255,.02);}
.list-row:last-child{border-bottom:none;}
.row-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.row-date{font-size:.78rem;font-weight:500;flex:1;}
.row-note{font-size:.68rem;color:var(--text-muted);flex:1;}
.row-badge{font-size:.68rem;padding:2px 8px;border-radius:20px;}
.row-del{background:none;border:none;cursor:pointer;color:rgba(239,68,68,.35);font-size:.85rem;padding:2px 4px;transition:color .15s;}
.row-del:hover{color:#ef4444;}
.empty-list{padding:1.25rem;text-align:center;font-size:.78rem;color:var(--text-faint);}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDj4QuT0qI0xs6tIxR5JFYjRS6gHFKDmRs",
  authDomain: "rtt-d9e9a.firebaseapp.com",
  projectId: "rtt-d9e9a",
  storageBucket: "rtt-d9e9a.firebasestorage.app",
  messagingSenderId: "582870399080",
  appId: "1:582870399080:web:9659424d8e7e15e0f9a3c7",
  measurementId: "G-F52M03CJV5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const DOC_ID = "sully";

function setSyncStatus(status, msg) {
  const bar = document.getElementById("sync-bar");
  const txt = document.getElementById("sync-txt");
  bar.className = "sync-bar " + status;
  txt.textContent = msg;
}

window.saveToFirestore = async function() {
  try {
    setSyncStatus("syncing", "Synchronisation…");
    await setDoc(doc(db, "rtt", DOC_ID), {
      rttData: JSON.stringify(window.rttData),
      cpData: JSON.stringify(window.cpData),
      updatedAt: new Date().toISOString()
    });
    setSyncStatus("synced", "✓ Synchronisé — " + new Date().toLocaleTimeString("fr-FR"));
  } catch(e) {
    setSyncStatus("error", "⚠ Hors ligne — données locales");
    console.error(e);
  }
};

onSnapshot(doc(db, "rtt", DOC_ID), (snap) => {
  if(snap.exists()) {
    const data = snap.data();
    try {
      const newRtt = JSON.parse(data.rttData);
      const newCp = JSON.parse(data.cpData);
      const rttFixed = {};
      Object.entries(newRtt).forEach(([k,v]) => { rttFixed[parseInt(k)] = v; });
      window.rttData = rttFixed;
      window.cpData = newCp;
      window.renderAll();
      setSyncStatus("synced", "✓ Synchronisé — " + new Date().toLocaleTimeString("fr-FR"));
    } catch(e) { console.error(e); }
  } else {
    window.saveToFirestore();
  }
}, (err) => {
  setSyncStatus("error", "⚠ Hors ligne — données locales");
});

</script>

  },
  2:{}, 3:{}, 4:{}, 5:{}, 6:{}
};

let cpData = {
  "2026-08-07":{qty:1,note:"Congés été"},
  "2026-08-10":{qty:1,note:"Congés été"},
  "2026-08-11":{qty:1,note:"Congés été"},
  "2026-08-12":{qty:1,note:"Congés été"},
  "2026-08-13":{qty:1,note:"Congés été"},
  "2026-08-14":{qty:1,note:"Congés été"},
  "2026-08-17":{qty:1,note:"Congés été"},
  "2026-08-18":{qty:1,note:"Congés été"},
  "2026-08-19":{qty:1,note:"Congés été"},
  "2026-08-20":{qty:1,note:"Congés été"},
  "2026-08-21":{qty:1,note:"Congés été"},
};

// Make global for Firebase
window.rttData = rttData;
window.cpData  = cpData;

// Auto-détection du cycle en cours selon la date du jour
function detectCurrentCycle() {
  const today = new Date().toISOString().slice(0,10);
  for(let i = 0; i < CYCLE_ANCHORS.length; i++) {
    const c = CYCLE_ANCHORS[i];
    const end = cycleEnd(c);
    if(today >= c.start && today <= end) return i;
  }
  return 0;
}
let activeCycle = detectCurrentCycle();
let modalDate = null;
let modalOpt  = null;
let modalType = "rtt";
const todayStr = new Date().toISOString().slice(0,10);

// ═══════════════════════════════════
//  HELPERS
// ═══════════════════════════════════
function pad(n){return String(n).padStart(2,"0");}
function addDays(s,n){const d=new Date(s+"T12:00:00");d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function cycleEnd(c){return addDays(c.start,12*7-1);}
function isWeekend(s){const d=new Date(s+"T12:00:00").getDay();return d===0||d===6;}
function isFerie(s){return HOLIDAYS.has(s);}
function fmtFull(s){const d=new Date(s+"T12:00:00");return DAY_NAMES_FR[d.getDay()]+" "+d.getDate()+" "+MONTHS_FR[d.getMonth()]+" "+d.getFullYear();}
function sumUsed(cid){return Object.values(window.rttData[cid]||{}).reduce((a,r)=>a+r.qty,0);}
function sumCPUsed(){return Object.values(window.cpData).reduce((a,r)=>a+r.qty,0);}

// ═══════════════════════════════════
//  RENDER ALL
// ═══════════════════════════════════
window.renderAll = function(){renderTabs();renderStats();renderCalendar();renderList();};

function renderTabs(){
  const nav=document.getElementById("cycle-nav");
  nav.innerHTML=CYCLE_ANCHORS.map(c=>{
    const parts=c.short.split(" / ");
    return `<div class="cycle-tab ${c.cls}${activeCycle===c.id?" active":""}" onclick="switchCycle(${c.id})">
      <span class="dot"></span><strong>${parts[0]}</strong><span style="opacity:.45;margin:0 3px;">→</span><strong>${parts[1]}</strong>
    </div>`;
  }).join("");
}

function switchCycle(id){activeCycle=id;renderAll();}

function renderStats(){
  const used=sumUsed(activeCycle),rem=Math.round((TOTAL-used)*10)/10;
  const cpUsed=sumCPUsed(),cpRem=Math.round((CP_TOTAL-cpUsed)*10)/10;
  const pct=Math.min(100,Math.round(used/TOTAL*100));
  const count=Object.keys(window.rttData[activeCycle]||{}).length;
  const cycle=CYCLE_ANCHORS[activeCycle];
  const endDate=new Date(cycleEnd(cycle)+"T12:00:00");
  const endFmt=endDate.getDate()+" "+MONTHS_FR[endDate.getMonth()]+" "+endDate.getFullYear();
  document.getElementById("stats-bar").innerHTML=`
    <div class="stat c1"><div class="stat-lbl">Alloué</div><div class="stat-val">${TOTAL.toFixed(1).replace(".",",")}</div><div class="stat-sub">jours / cycle</div></div>
    <div class="stat c2"><div class="stat-lbl">RTT posés</div><div class="stat-val">${used.toFixed(1).replace(".",",")}</div><div class="stat-sub">${count} entrée${count>1?"s":""}</div><div class="prog-track"><div class="prog-fill${rem<0?" over":""}" style="width:${pct}%"></div></div></div>
    <div class="stat c3"><div class="stat-lbl">RTT restant</div><div class="stat-val" style="color:${rem<0?"#f87171":"#fbbf24"}">${rem.toFixed(1).replace(".",",")}</div><div class="stat-sub">jours</div></div>
    <div class="stat c4"><div class="stat-lbl">Fin de cycle</div><div class="stat-val" style="font-size:1rem;padding-top:.3rem;">${endFmt}</div><div class="stat-sub">${cycle.label}</div></div>
    <div class="stat" style="border:.5px solid rgba(16,185,129,.25);position:relative;overflow:hidden;">
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#10b981,#06b6d4);border-radius:12px 12px 0 0;"></div>
      <div class="stat-lbl">Congés payés</div>
      <div class="stat-val" style="color:#34d399;">${cpUsed.toFixed(1).replace(".",",")}</div>
      <div class="stat-sub">${cpUsed.toFixed(1).replace(".",",")} / 27 j · 189 h</div>
      <div style="display:flex;justify-content:space-between;margin-top:3px;">
        <span class="stat-sub" style="color:${cpRem<0?"#f87171":"#6ee7b7"};font-weight:500;">${cpRem.toFixed(1).replace(".",",")} j restants</span>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${Math.min(100,Math.round(cpUsed/CP_TOTAL*100))}%;background:linear-gradient(90deg,#10b981,#06b6d4);"></div></div>
    </div>`;
}

function renderCalendar(){
  const cycle=CYCLE_ANCHORS[activeCycle];
  const startStr=cycle.start,endStr=cycleEnd(cycle);
  const startD=new Date(startStr+"T12:00:00"),endD=new Date(endStr+"T12:00:00");
  const months=[];
  let cur=new Date(startD.getFullYear(),startD.getMonth(),1);
  while(cur<=endD){months.push({year:cur.getFullYear(),month:cur.getMonth()});cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);}
  const rtts=window.rttData[activeCycle]||{};
  const wrap=document.getElementById("cal-wrap");
  wrap.innerHTML="";
  months.forEach(({year,month})=>{
    const card=document.createElement("div");
    card.className="month-card";
    const daysInMonth=new Date(year,month+1,0).getDate();
    const firstDow=new Date(year,month,1).getDay();
    const offset=firstDow===0?6:firstDow-1;
    let grid=DAYS_SHORT.map((d,i)=>`<div class="dow${i>=5?" we":""}">${d}</div>`).join("");
    for(let i=0;i<offset;i++) grid+=`<div class="day empty"></div>`;
    for(let d=1;d<=daysInMonth;d++){
      const key=`${year}-${pad(month+1)}-${pad(d)}`;
      const inCycle=key>=startStr&&key<=endStr;
      const we=isWeekend(key),fe=isFerie(key);
      const rtt=rtts[key],cp=window.cpData[key];
      let cls="day";
      if(!inCycle) cls+=" empty";
      else if(we) cls+=" we";
      else if(fe) cls+=" fe";
      else if(rtt&&rtt.qty>=1) cls+=" rtt-full";
      else if(rtt&&rtt.qty<1) cls+=" rtt-half";
      else if(cp&&cp.qty>=1) cls+=" cp-full";
      else if(cp&&cp.qty<1) cls+=" cp-half";
      if(key===todayStr) cls+=" today";
      const onclick=(!we&&!fe&&inCycle)?`onclick="openModal('${key}')"` :"";
      grid+=`<div class="${cls}" ${onclick}>${d}</div>`;
    }
    card.innerHTML=`<div class="month-title">${MONTHS_FR[month]}<span class="yr">${year}</span></div><div class="cal-grid">${grid}</div>`;
    wrap.appendChild(card);
  });
}

function renderList(){
  const body=document.getElementById("list-body");
  const rttE=Object.entries(window.rttData[activeCycle]||{}).map(([k,v])=>({key:k,r:v,type:"rtt"}));
  const cpE=Object.entries(window.cpData).map(([k,v])=>({key:k,r:v,type:"cp"}));
  const all=[...rttE,...cpE].sort((a,b)=>a.key.localeCompare(b.key));
  document.getElementById("list-count").textContent=all.length+" entrée"+(all.length>1?"s":"");
  if(!all.length){body.innerHTML='<div class="empty-list">Aucun jour posé.</div>';return;}
  let html="",prevM=null;
  all.forEach(({key,r,type})=>{
    const m=key.slice(0,7);
    if(m!==prevM){const[y,mo]=m.split("-");html+=`<div style="padding:7px 1.2rem 3px;font-size:.65rem;color:var(--text-faint);text-transform:uppercase;letter-spacing:.08em;font-weight:600;">${MONTHS_FR[parseInt(mo)-1]} ${y}</div>`;prevM=m;}
    const isRTT=type==="rtt";
    const dotColor=isRTT?(r.qty<1?"#f59e0b":"#3b82f6"):(r.qty<1?"#34d399":"#10b981");
    const badgeBg=isRTT?(r.qty<1?"var(--rtt-half-bg)":"var(--rtt-full-bg)"):(r.qty<1?"var(--cp-half-bg)":"var(--cp-full-bg)");
    const badgeCol=isRTT?(r.qty<1?"#fcd34d":"#93c5fd"):(r.qty<1?"#a7f3d0":"#6ee7b7");
    const lbl=isRTT?"RTT":"CP",qty=r.qty<1?"½ j":"1 j";
    const delFn=isRTT?`deleteRTT('${key}')`:`deleteCP('${key}')`;
    html+=`<div class="list-row"><span class="row-dot" style="background:${dotColor};"></span><span class="row-date">${fmtFull(key)}</span><span class="row-note">${r.note||""}</span><span class="row-badge" style="background:${badgeBg};color:${badgeCol};">${lbl} · ${qty}</span><button class="row-del" onclick="${delFn}">✕</button></div>`;
  });
  body.innerHTML=html;
}

// ═══════════════════════════════════
//  MODAL
// ═══════════════════════════════════
function setModalType(type){
  modalType=type;
  const rb=document.getElementById("toggle-rtt"),cb=document.getElementById("toggle-cp");
  if(type==="rtt"){
    rb.style.background="var(--rtt-full-bg)";rb.style.borderColor="rgba(59,130,246,.5)";rb.style.color="#93c5fd";
    cb.style.background="var(--surface2)";cb.style.borderColor="var(--border2)";cb.style.color="var(--text)";
    document.getElementById("m-title").textContent="Poser un RTT";
  } else {
    cb.style.background="var(--cp-full-bg)";cb.style.borderColor="rgba(16,185,129,.5)";cb.style.color="#6ee7b7";
    rb.style.background="var(--surface2)";rb.style.borderColor="var(--border2)";rb.style.color="var(--text)";
    document.getElementById("m-title").textContent="Poser un congé payé";
  }
  document.getElementById("m-err").textContent="";
}

function openModal(key){
  modalDate=key;modalOpt=null;
  const eR=window.rttData[activeCycle][key],eC=window.cpData[key],ex=eR||eC;
  if(eC&&!eR) setModalType("cp"); else setModalType("rtt");
  document.getElementById("m-date").textContent=fmtFull(key);
  document.getElementById("m-note").value=ex?ex.note||"":"";
  document.getElementById("m-err").textContent="";
  ["ob-full","ob-am","ob-pm"].forEach(id=>document.getElementById(id).className="ob");
  if(ex){
    document.getElementById("rm-row").style.display="block";
    if(ex.qty>=1){modalOpt="full";document.getElementById("ob-full").className="ob sel-full";}
    else if(ex.note==="Matin"){modalOpt="am";document.getElementById("ob-am").className="ob sel-half";}
    else{modalOpt="pm";document.getElementById("ob-pm").className="ob sel-half";}
  } else document.getElementById("rm-row").style.display="none";
  document.getElementById("overlay").classList.add("open");
}

function selOpt(opt){
  modalOpt=opt;
  ["ob-full","ob-am","ob-pm"].forEach(id=>document.getElementById(id).className="ob");
  if(opt==="full") document.getElementById("ob-full").className="ob sel-full";
  else if(opt==="am") document.getElementById("ob-am").className="ob sel-half";
  else if(opt==="pm") document.getElementById("ob-pm").className="ob sel-half";
  document.getElementById("m-err").textContent="";
}

function confirmModal(){
  if(!modalOpt){document.getElementById("m-err").textContent="Veuillez choisir une option.";return;}
  const note=document.getElementById("m-note").value.trim()||(modalOpt==="am"?"Matin":modalOpt==="pm"?"Après-midi":"");
  if(modalType==="cp"){
    if(modalOpt==="rm"){delete window.cpData[modalDate];}
    else{
      const qty=modalOpt==="full"?1:0.5;
      const prev=window.cpData[modalDate]?window.cpData[modalDate].qty:0;
      if(sumCPUsed()-prev+qty>CP_TOTAL){document.getElementById("m-err").textContent=`Dépassement CP ! Restant : ${(CP_TOTAL-sumCPUsed()+prev).toFixed(1).replace(".",",")} j.`;return;}
      window.cpData[modalDate]={qty,note};
    }
  } else {
    const rtts=window.rttData[activeCycle];
    if(modalOpt==="rm"){delete rtts[modalDate];}
    else{
      const qty=modalOpt==="full"?1:0.5;
      const prev=rtts[modalDate]?rtts[modalDate].qty:0;
      if(sumUsed(activeCycle)-prev+qty>TOTAL){document.getElementById("m-err").textContent=`Dépassement RTT ! Restant : ${(TOTAL-sumUsed(activeCycle)+prev).toFixed(1).replace(".",",")} j.`;return;}
      rtts[modalDate]={qty,note};
    }
  }
  closeModal();renderAll();
  if(window.saveToFirestore) window.saveToFirestore();
}

function closeModal(){document.getElementById("overlay").classList.remove("open");modalDate=null;}
function deleteRTT(key){delete window.rttData[activeCycle][key];renderAll();if(window.saveToFirestore)window.saveToFirestore();}
function deleteCP(key){delete window.cpData[key];renderAll();if(window.saveToFirestore)window.saveToFirestore();}

document.getElementById("overlay").addEventListener("click",e=>{if(e.target===document.getElementById("overlay"))closeModal();});

// ═══════════════════════════════════
//  INIT
// ═══════════════════════════════════
renderAll();
setModalType("rtt");

// Service Worker
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").then(()=>console.log("SW registered"));
}
</script>
